<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Chess Game</title>

<style>

:root{
  --piece-size: 52px;
}

*{
  box-sizing:border-box;
}

html,
body{
  margin:0;
  width:100%;
  height:100%;
  overflow:hidden;
  font-family:Arial,sans-serif;
  background:#111827;
}

#layout{
  width:100vw;
  height:100vh;
  display:flex;
  background:#111827;
}

/* =========================
   PANELS
========================= */

.side-panel{
  background:#f3f4f6;
  display:flex;
  flex-direction:column;
  overflow:hidden;
}

#chatPanel{
  border-right:1px solid #374151;
}

#movesPanel{
  border-left:1px solid #374151;
}

.panel-title{
  padding:10px;
  font-weight:bold;
  background:#e5e7eb;
  border-bottom:1px solid #d1d5db;
}

.panel-body{
  flex:1;
  padding:10px;
  overflow:auto;
  font-size:14px;
}

#settings{
  padding:10px;
  background:#e5e7eb;
  border-top:1px solid #d1d5db;
  display:flex;
  flex-direction:column;
  gap:8px;
}

button{
  padding:9px 10px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  background:#d1d5db;
  font-size:14px;
}

button:hover{
  background:#c4c9d1;
}

/* =========================
   BOARD AREA
========================= */

#boardPanel{
  background:#111827;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  overflow:hidden;
}

.player-bar{
  width:100%;
  height:42px;
  color:white;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:0 14px;
  font-size:15px;
}

#boardWrap{
  display:flex;
  justify-content:center;
  align-items:center;
}

#board{
  display:grid;
  grid-template-columns:repeat(8,1fr);
  grid-template-rows:repeat(8,1fr);
  border:3px solid #000;
  transition:transform 0.25s ease;
}

.square{
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:var(--piece-size);
  user-select:none;
  cursor:pointer;

  min-width:0;
  min-height:0;
  overflow:hidden;
  line-height:1;
}

.light{
  background:#f0d9b5;
}

.dark{
  background:#b58863;
}

.piece{
  display:block;
  line-height:1;
  pointer-events:none;
  transition:transform 0.25s ease;
}

.selected{
  outline:4px solid #2563eb;
  outline-offset:-4px;
}

.legal{
  box-shadow:inset 0 0 0 999px rgba(37,99,235,0.18);
}

/* =========================
   MOVES
========================= */

.move-row{
  display:grid;
  grid-template-columns:34px 1fr 1fr;
  gap:6px;
  padding:4px 0;
  border-bottom:1px solid #e5e7eb;
}

.actions{
  padding:10px;
  border-top:1px solid #d1d5db;
  display:flex;
  flex-direction:column;
  gap:8px;
}

.promo{

    width:90px;
    height:90px;

    font-size:64px;

    border:2px solid #bbb;
    border-radius:12px;

    background:white;

    cursor:pointer;
}

.promo:hover{

    background:#eef5ff;
}
  
#status{
  padding:8px 10px;
  background:#fff;
  border-top:1px solid #d1d5db;
  font-size:14px;
}

/* =========================
   PORTRAIT
========================= */

.portrait #chatPanel{
  border-right:none;
  border-top:1px solid #374151;
}

.portrait #movesPanel{
  border-left:none;
  border-bottom:1px solid #374151;
}

.portrait .side-panel{
  width:100%;
}

.portrait #movesPanel{
  order:1;
}

.portrait #boardPanel{
  order:2;
}

.portrait #chatPanel{
  order:3;
}

/* =========================
   LANDSCAPE
========================= */

.landscape #chatPanel{
  order:1;
}

.landscape #boardPanel{
  order:2;
}

.landscape #movesPanel{
  order:3;
}

.landscape.swap #chatPanel{
  order:3;
}

.landscape.swap #movesPanel{
  order:1;
}

.portrait.swap #chatPanel{
  order:1;
}

.portrait.swap #movesPanel{
  order:3;
}
</style>
  
</head>

<body>

<div id="promotionDialog" style="
display:none;
position:fixed;
inset:0;
background:rgba(0,0,0,.45);
justify-content:center;
align-items:center;
z-index:1000;
">

<div style="
background:white;
padding:20px;
border-radius:12px;
display:flex;
gap:20px;
">

<button class="promo" onclick="choosePromotion('q')">♕</button>
<button class="promo" onclick="choosePromotion('r')">♖</button>
<button class="promo" onclick="choosePromotion('b')">♗</button>
<button class="promo" onclick="choosePromotion('n')">♘</button>

</div>

</div>
  
<div id="layout">

  <div id="chatPanel" class="side-panel">
    <div class="panel-title">Чат</div>

    <div class="panel-body">
      <p><b>Alex:</b> Привет</p>
      <p><b>Вы:</b> Играем 5+5</p>
    </div>

    <div id="settings">
      <button onclick="swapPanels()">Поменять поля</button>
      <button onclick="flipBoard()">Перевернуть доску</button>
      <button onclick="newGame()">Новая партия</button>
    </div>
  </div>

  <div id="boardPanel">

    <div class="player-bar">
      <span id="topPlayer">Alex</span>
      <strong id="blackTimer">05:00</strong>
    </div>

    <div id="boardWrap">
      <div id="board"></div>
    </div>

    <div class="player-bar">
      <span id="bottomPlayer">Вы</span>
      <strong id="whiteTimer">05:00</strong>
    </div>

  </div>

  <div id="movesPanel" class="side-panel">
    <div class="panel-title">Ходы</div>

    <div class="panel-body" id="movesList"></div>

    <div id="status">Ход белых</div>

    <div class="actions">
      <button onclick="offerDraw()">🤝 Предложить ничью</button>
      <button onclick="resign()">🏳 Сдаться</button>
    </div>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/chess.js@0.10.3/chess.min.js"></script>

<script>
const settings={
  swapPanels:false,
  flipBoard:false
};

let chess=new Chess();
let selectedSquare=null;
let legalTargets=[];

function resizeLayout(){
  const layout=document.getElementById("layout");
  const boardPanel=document.getElementById("boardPanel");
  const chatPanel=document.getElementById("chatPanel");
  const movesPanel=document.getElementById("movesPanel");
  const board=document.getElementById("board");

  const w=window.innerWidth;
  const h=window.innerHeight;
  const S=Math.min(w,h);

  const cellSize = S / 8;
const pieceSize = cellSize * 0.92;

document.documentElement.style.setProperty(
  "--piece-size",
  pieceSize + "px"
);

  board.style.width=S+"px";
  board.style.height=S+"px";

  if(w>=h){
    layout.classList.remove("portrait");
    layout.classList.add("landscape");
    layout.style.flexDirection="row";

    const side=(w-S)/2;

    chatPanel.style.width=side+"px";
    movesPanel.style.width=side+"px";

    chatPanel.style.height=h+"px";
    movesPanel.style.height=h+"px";

    boardPanel.style.width=S+"px";
    boardPanel.style.height=h+"px";
  }else{
    layout.classList.remove("landscape");
    layout.classList.add("portrait");
    layout.style.flexDirection="column";

    const side=(h-S)/2;

    movesPanel.style.height=side+"px";
    chatPanel.style.height=side+"px";

    movesPanel.style.width=w+"px";
    chatPanel.style.width=w+"px";

    boardPanel.style.width=w+"px";
    boardPanel.style.height=S+"px";
  }
}

function renderBoard(){
  const board=document.getElementById("board");
  board.innerHTML="";

  const files=settings.flipBoard
    ? ["h","g","f","e","d","c","b","a"]
    : ["a","b","c","d","e","f","g","h"];

  const ranks=settings.flipBoard
    ? [1,2,3,4,5,6,7,8]
    : [8,7,6,5,4,3,2,1];

  for(const rank of ranks){
    for(let fileIndex=0;fileIndex<8;fileIndex++){
      const file=files[fileIndex];
      const squareName=file+rank;

      const square=document.createElement("div");
      square.className="square";

      const realFileIndex=["a","b","c","d","e","f","g","h"].indexOf(file);
      const isLight=(realFileIndex+rank)%2===0;
      square.classList.add(isLight ? "light" : "dark");

      if(selectedSquare===squareName){
        square.classList.add("selected");
      }

      if(legalTargets.includes(squareName)){
        square.classList.add("legal");
      }

      const pieceData=chess.get(squareName);

      if(pieceData){
        const piece=document.createElement("span");
        piece.className="piece";
        piece.textContent=getPieceSymbol(pieceData);
        square.appendChild(piece);
      }

      square.onclick=()=>clickSquare(squareName);
      board.appendChild(square);
    }
  }

  renderMoves();
  renderStatus();
}

function getPieceSymbol(piece){
  const symbols={
    p:{w:"♙",b:"♟"},
    r:{w:"♖",b:"♜"},
    n:{w:"♘",b:"♞"},
    b:{w:"♗",b:"♝"},
    q:{w:"♕",b:"♛"},
    k:{w:"♔",b:"♚"}
  };

  return symbols[piece.type][piece.color];
}

function clickSquare(squareName){
  if(chess.game_over()) return;

  if(!selectedSquare){
    const piece=chess.get(squareName);

    if(!piece) return;
    if(piece.color!==chess.turn()) return;

    selectedSquare=squareName;
    legalTargets=getLegalTargets(squareName);
    renderBoard();
    return;
  }

  if(selectedSquare===squareName){
    selectedSquare=null;
    legalTargets=[];
    renderBoard();
    return;
  }

  const piece=chess.get(selectedSquare);

  if(isPromotionMove(piece, selectedSquare, squareName)){
    showPromotionDialog(selectedSquare, squareName);
    return;
  }

  makeMove(selectedSquare, squareName, null);
}

function getLegalTargets(squareName){
  return chess.moves({
    square:squareName,
    verbose:true
  }).map(move=>move.to);
}

function isPromotionMove(piece, from, to){
  if(!piece || piece.type!=="p") return false;

  const targetRank=to[1];

  return (
    (piece.color==="w" && targetRank==="8") ||
    (piece.color==="b" && targetRank==="1")
  );
}

function makeMove(from, to, promotion){
  const move=chess.move({
    from:from,
    to:to,
    promotion:promotion || undefined
  });

  selectedSquare=null;
  legalTargets=[];

  if(!move){
    renderBoard();
    return;
  }

  renderBoard();
}

let promotionFrom="";
let promotionTo="";

function showPromotionDialog(from,to){

    promotionFrom=from;
    promotionTo=to;

    document.getElementById("promotionDialog").style.display="flex";

}

function choosePromotion(piece){

    document.getElementById("promotionDialog").style.display="none";

    makeMove(
        promotionFrom,
        promotionTo,
        piece
    );

}
  
function renderMoves(){
  const movesList=document.getElementById("movesList");
  const history=chess.history();

  movesList.innerHTML="";

  for(let i=0;i<history.length;i+=2){
    const row=document.createElement("div");
    row.className="move-row";

    row.innerHTML=`
      <span>${Math.floor(i/2)+1}.</span>
      <span>${history[i] || ""}</span>
      <span>${history[i+1] || ""}</span>
    `;

    movesList.appendChild(row);
  }

  movesList.scrollTop=movesList.scrollHeight;
}

function renderStatus(){
  const status=document.getElementById("status");

  if(chess.in_checkmate()){
    status.textContent=chess.turn()==="w"
      ? "Мат. Победили чёрные."
      : "Мат. Победили белые.";
    return;
  }

  if(chess.in_stalemate()){
    status.textContent="Пат. Ничья.";
    return;
  }

  if(chess.in_draw()){
    status.textContent="Ничья.";
    return;
  }

  if(chess.in_check()){
    status.textContent=chess.turn()==="w"
      ? "Шах белым. Ход белых."
      : "Шах чёрным. Ход чёрных.";
    return;
  }

  status.textContent=chess.turn()==="w"
    ? "Ход белых"
    : "Ход чёрных";
}

function swapPanels(){
  settings.swapPanels=!settings.swapPanels;

  const layout=document.getElementById("layout");

  if(settings.swapPanels){
    layout.classList.add("swap");
  }else{
    layout.classList.remove("swap");
  }
}

function flipBoard(){
  settings.flipBoard=!settings.flipBoard;
  renderBoard();
}

function newGame(){
  chess=new Chess();
  selectedSquare=null;
  legalTargets=[];
  renderBoard();
}

function offerDraw(){
  alert("Предложение ничьей отправлено.");
}

function resign(){
  alert("Вы сдались.");
}

resizeLayout();
renderBoard();

window.addEventListener("resize",resizeLayout);
</script>



  
  
<!-- ========================================
     SERVICE CONSOLE
======================================== -->

<div id="service-console">
fix превращение пешки и размер фигур  | v2.1.1
</div>

<div class="row" id="build-down">
deploy: --
</div>

<script>
(function () {
  const now = new Date();

  const pad = n =>
    String(n).padStart(2, "0");

  const date =
      pad(now.getDate())
    + "."
    + pad(now.getMonth() + 1)
    + "."
    + now.getFullYear();

  const time =
      pad(now.getHours())
    + ":"
    + pad(now.getMinutes());

  document
    .getElementById("build-down")
    .textContent =
      "deploy: "
      + date
      + " "
      + time;
})();
</script>


  
</body>
</html>

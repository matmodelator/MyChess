<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Chess Game</title>

<style>
*{
  box-sizing:border-box;
}

html,
body{
  margin:0;
  width:100%;
  height:100%;
  overflow:hidden;
  font-family:Arial,sans-serif;
  background:#111827;
  color:#111827;
}

#layout{
  width:100vw;
  height:100vh;
  display:flex;
  background:#111827;
}

/* =========================
   PANELS
========================= */

.side-panel{
  background:#f3f4f6;
  display:flex;
  flex-direction:column;
  overflow:hidden;
}

#chatPanel{
  border-right:1px solid #374151;
}

#movesPanel{
  border-left:1px solid #374151;
}

.panel-title{
  padding:10px;
  font-weight:bold;
  background:#e5e7eb;
  border-bottom:1px solid #d1d5db;
}

.panel-body{
  flex:1;
  padding:10px;
  overflow:auto;
  font-size:14px;
}

#settings{
  padding:10px;
  background:#e5e7eb;
  border-top:1px solid #d1d5db;
  display:flex;
  flex-direction:column;
  gap:8px;
}

button{
  padding:9px 10px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  background:#d1d5db;
  font-size:14px;
}

button:hover{
  background:#c4c9d1;
}

/* =========================
   BOARD AREA
========================= */

#boardPanel{
  background:#111827;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  overflow:hidden;
}

.player-bar{
  width:100%;
  height:42px;
  color:white;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:0 14px;
  font-size:15px;
}

#boardWrap{
  display:flex;
  justify-content:center;
  align-items:center;
}

#board{
  display:grid;
  grid-template-columns:repeat(8,1fr);
  grid-template-rows:repeat(8,1fr);
  border:3px solid #000;
  transition:transform 0.25s ease;
}

.square{
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:clamp(24px,6vw,58px);
  user-select:none;
}

.light{
  background:#f0d9b5;
}

.dark{
  background:#b58863;
}

.piece{
  transition:transform 0.25s ease;
}

.selected{
  outline:4px solid #2563eb;
  outline-offset:-4px;
}

/* =========================
   MOVES
========================= */

.move-row{
  display:grid;
  grid-template-columns:34px 1fr 1fr;
  gap:6px;
  padding:4px 0;
  border-bottom:1px solid #e5e7eb;
}

.actions{
  padding:10px;
  border-top:1px solid #d1d5db;
  display:flex;
  flex-direction:column;
  gap:8px;
}

/* =========================
   PORTRAIT
========================= */

.portrait #chatPanel{
  border-right:none;
  border-top:1px solid #374151;
}

.portrait #movesPanel{
  border-left:none;
  border-bottom:1px solid #374151;
}

.portrait .side-panel{
  width:100%;
}

.portrait #movesPanel{
  order:1;
}

.portrait #boardPanel{
  order:2;
}

.portrait #chatPanel{
  order:3;
}

/* =========================
   LANDSCAPE
========================= */

.landscape #chatPanel{
  order:1;
}

.landscape #boardPanel{
  order:2;
}

.landscape #movesPanel{
  order:3;
}

.landscape.swap #chatPanel{
  order:3;
}

.landscape.swap #movesPanel{
  order:1;
}

.portrait.swap #chatPanel{
  order:1;
}

.portrait.swap #movesPanel{
  order:3;
}
</style>
</head>

<body>

<div id="layout">

  <div id="chatPanel" class="side-panel">
    <div class="panel-title">Чат</div>

    <div class="panel-body">
      <p><b>Alex:</b> Привет</p>
      <p><b>Вы:</b> Играем 5+5</p>
    </div>

    <div id="settings">
      <button onclick="swapPanels()">Поменять поля</button>
      <button onclick="flipBoard()">Перевернуть доску</button>
    </div>
  </div>

  <div id="boardPanel">

    <div class="player-bar">
      <span>Alex</span>
      <strong>05:00</strong>
    </div>

    <div id="boardWrap">
      <div id="board"></div>
    </div>

    <div class="player-bar">
      <span>Вы</span>
      <strong>05:00</strong>
    </div>

  </div>

  <div id="movesPanel" class="side-panel">
    <div class="panel-title">Ходы</div>

    <div class="panel-body" id="movesList">
      <div class="move-row">
        <span>1.</span>
        <span>e4</span>
        <span>e5</span>
      </div>
      <div class="move-row">
        <span>2.</span>
        <span>Nf3</span>
        <span>Nc6</span>
      </div>
    </div>

    <div class="actions">
      <button>🤝 Предложить ничью</button>
      <button>🏳 Сдаться</button>
    </div>
  </div>

</div>

<script>
const settings={
  swapPanels:false,
  flipBoard:false
};

const startPosition={
  a8:"♜",b8:"♞",c8:"♝",d8:"♛",e8:"♚",f8:"♝",g8:"♞",h8:"♜",
  a7:"♟",b7:"♟",c7:"♟",d7:"♟",e7:"♟",f7:"♟",g7:"♟",h7:"♟",

  a2:"♙",b2:"♙",c2:"♙",d2:"♙",e2:"♙",f2:"♙",g2:"♙",h2:"♙",
  a1:"♖",b1:"♘",c1:"♗",d1:"♕",e1:"♔",f1:"♗",g1:"♘",h1:"♖"
};

let boardState={...startPosition};
let selectedSquare=null;

function resizeLayout(){
  const layout=document.getElementById("layout");
  const boardPanel=document.getElementById("boardPanel");
  const chatPanel=document.getElementById("chatPanel");
  const movesPanel=document.getElementById("movesPanel");
  const board=document.getElementById("board");

  const w=window.innerWidth;
  const h=window.innerHeight;

  const S=Math.min(w,h);

  board.style.width=S+"px";
  board.style.height=S+"px";

  if(w>=h){
    layout.classList.remove("portrait");
    layout.classList.add("landscape");

    layout.style.flexDirection="row";

    const side=(w-S)/2;

    chatPanel.style.width=side+"px";
    movesPanel.style.width=side+"px";

    chatPanel.style.height=h+"px";
    movesPanel.style.height=h+"px";

    boardPanel.style.width=S+"px";
    boardPanel.style.height=h+"px";
  }else{
    layout.classList.remove("landscape");
    layout.classList.add("portrait");

    layout.style.flexDirection="column";

    const side=(h-S)/2;

    movesPanel.style.height=side+"px";
    chatPanel.style.height=side+"px";

    movesPanel.style.width=w+"px";
    chatPanel.style.width=w+"px";

    boardPanel.style.width=w+"px";
    boardPanel.style.height=S+"px";
  }
}

function renderBoard(){
  const board=document.getElementById("board");
  board.innerHTML="";

  const files=["a","b","c","d","e","f","g","h"];

  for(let rank=8;rank>=1;rank--){
    for(let fileIndex=0;fileIndex<8;fileIndex++){
      const file=files[fileIndex];
      const squareName=file+rank;

      const square=document.createElement("div");
      square.className="square";

      const isLight=(fileIndex+rank)%2===0;
      square.classList.add(isLight ? "light" : "dark");

      if(selectedSquare===squareName){
        square.classList.add("selected");
      }

      const piece=document.createElement("span");
      piece.className="piece";
      piece.textContent=boardState[squareName] || "";

      square.appendChild(piece);

      square.onclick=()=>clickSquare(squareName);

      board.appendChild(square);
    }
  }

  applyBoardRotation();
}

function clickSquare(squareName){
  if(!selectedSquare){
    if(!boardState[squareName]) return;

    selectedSquare=squareName;
    renderBoard();
    return;
  }

  if(selectedSquare===squareName){
    selectedSquare=null;
    renderBoard();
    return;
  }

  boardState[squareName]=boardState[selectedSquare];
  delete boardState[selectedSquare];

  selectedSquare=null;
  renderBoard();
}

function swapPanels(){
  settings.swapPanels=!settings.swapPanels;

  const layout=document.getElementById("layout");

  if(settings.swapPanels){
    layout.classList.add("swap");
  }else{
    layout.classList.remove("swap");
  }
}

function flipBoard(){
  settings.flipBoard=!settings.flipBoard;
  applyBoardRotation();
}

function applyBoardRotation(){
  const board=document.getElementById("board");
  const pieces=document.querySelectorAll(".piece");

  board.style.transform=settings.flipBoard
    ? "rotate(180deg)"
    : "rotate(0deg)";

  pieces.forEach(piece=>{
    piece.style.transform=settings.flipBoard
      ? "rotate(180deg)"
      : "rotate(0deg)";
  });
}

resizeLayout();
renderBoard();

window.addEventListener("resize",resizeLayout);
</script>

  
<!-- ========================================
     SERVICE CONSOLE
======================================== -->

<div id="service-console">
GPT  | v1.0.0
</div>

<div class="row" id="build-down">
deploy: --
</div>

<script>
(function () {
  const now = new Date();

  const pad = n =>
    String(n).padStart(2, "0");

  const date =
      pad(now.getDate())
    + "."
    + pad(now.getMonth() + 1)
    + "."
    + now.getFullYear();

  const time =
      pad(now.getHours())
    + ":"
    + pad(now.getMinutes());

  document
    .getElementById("build-down")
    .textContent =
      "deploy: "
      + date
      + " "
      + time;
})();
</script>
  
</body>
</html>
